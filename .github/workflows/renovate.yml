name: Renovate
# Self-hosted Renovate via GitHub Actions — no GitHub App installation needed.
# Each repo gets this workflow + a renovate.json config file.
# The workflow is triggered weekly (Mon before 5am IST = Sun 23:30 UTC) and on-demand.

on:
  schedule:
    # Every Monday at 03:30 IST = Sunday 22:00 UTC
    - cron: '0 22 * * 0'
  workflow_dispatch:
    inputs:
      logLevel:
        description: 'Log level'
        required: false
        default: 'info'
        type: choice
        options:
          - info
          - debug

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Generate vagary-renovate App token
        id: app-token
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1
        with:
          app-id: ${{ secrets.RENOVATE_APP_ID }}
          private-key: ${{ secrets.RENOVATE_APP_PRIVATE_KEY }}

      - name: Self-hosted Renovate
        uses: renovatebot/github-action@6d859fc95779be83a0335ca704879b47e5d79641 # v46.1.16
        with:
          configurationFile: .github/renovate.json
          token: ${{ steps.app-token.outputs.token }}
        env:
          LOG_LEVEL: ${{ inputs.logLevel || 'info' }}
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          RENOVATE_ONBOARDING: 'false'
          RENOVATE_REQUIRE_CONFIG: 'ignored'
          RENOVATE_PLATFORM: 'github'
          RENOVATE_GIT_AUTHOR: 'Renovate Bot <bot@renovate.com>'
