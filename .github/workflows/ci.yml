# Thin caller -> Cramraika/.github reusable Python CI.
# Migrated to the fleet reusable-workflow library (2026-06-26). Only the trigger
# block + language inputs are repo-specific; the CI logic lives in the reusable
# workflow. Preserves the prior paths-ignore + push/PR-to-main/master semantics.
name: CI

on:
  push:
    branches: [main, master]
    paths-ignore: ['*.md', 'docs/**', '.claude/**', '.vscode/**']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  ci:
    uses: Cramraika/.github/.github/workflows/ci-python.yml@main
    with:
      runner: ${{ vars.RUNNER_TYPE || 'ubuntu-latest' }}
      python-version: "3.11"
    secrets: inherit
