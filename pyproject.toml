# Local tooling marker — added 2026-05-05 for deptry compatibility (see universal-claudemd.md §44).
# IMPORTANT: NO [project] table on purpose. An empty [project] makes deptry extract
# deps from [project] (finding ZERO) and IGNORE requirements.txt, so every real
# requirements.txt dep shows as a DEP001 false-positive (the marker-template bug
# fixed 2026-06-23). With no [project], deptry scans requirements.txt — the real
# dependency source for this repo.

[tool.deptry]
# Universal-default deptry config (v37). Deps are read from requirements.txt.
ignore = ["DEP002", "DEP003"]  # transitive deps; adjust per-repo
extend_exclude = ["tests", "docs", "scripts"]

[tool.vulture]
# Universal-default vulture config (v37 + OW-503 vendored-exclude hardening).
# The vendored excludes stop vulture recursing into .venv/site-packages/node_modules —
# a deeply-nested generated file there (e.g. sympy resolvent_lookup.py, AST depth 568)
# blows Python's recursion limit and aborts the whole scan (OW-503).
min_confidence = 80
ignore_decorators = ["@app.route", "@router.", "@pytest.fixture"]
exclude = [
    "tests/", "migrations/",
    ".venv/", "venv/", "*/.venv/", "*/venv/",
    "site-packages/", "*/site-packages/",
    "node_modules/", "*/node_modules/",
    ".git/", "*/.next/", "build/", "dist/", "__pycache__/",
]
