# lychee link-checker config (v37 universal default)
# Run: lychee --config lychee.toml .

# Exclude vendored / generated trees (regex; lychee 0.23+ does NOT support glob)
exclude_path = [
    "node_modules",
    "dist",
    "build",
    "\\.next",
    "__pycache__",
    "\\.pytest_cache",
    "\\.gitnexus",
    "\\.serena",
    "graphify-out",
    "coverage",
]

# Exclude domains that block scrapers
exclude = [
    "^https://(twitter|x)\\.com/",
    "^https://linkedin\\.com/",
    "^https://(www\\.)?facebook\\.com/",
    "^https://localhost",
    "^http://127\\.0\\.0\\.1",
    "^https://127\\.0\\.0\\.1",
    "^https://0\\.0\\.0\\.0",
]

# Network
max_concurrency = 8
timeout = 20
retry_wait_time = 2
max_retries = 2

# Output
no_progress = false
verbose = "info"
